<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="60%" stop-color="#064e3b"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="txt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a7f3d0"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <circle cx="32" cy="32" r="27" fill="none" stroke="#10b981" stroke-width="0.6" stroke-opacity="0.5"/>
  <circle cx="32" cy="32" r="24" fill="none" stroke="#22d3ee" stroke-width="0.4" stroke-dasharray="2 3" stroke-opacity="0.7"/>

  <g stroke="#34d399" stroke-width="0.8" stroke-linecap="round" opacity="0.85">
    <line x1="5" y1="32" x2="11" y2="32"/>
    <line x1="53" y1="32" x2="59" y2="32"/>
    <line x1="32" y1="5" x2="32" y2="11"/>
    <line x1="32" y1="53" x2="32" y2="59"/>
  </g>

  <g fill="#22d3ee">
    <circle cx="11" cy="32" r="1"/>
    <circle cx="53" cy="32" r="1"/>
    <circle cx="32" cy="11" r="1"/>
    <circle cx="32" cy="53" r="1"/>
  </g>

  <text x="32" y="44"
        text-anchor="middle"
        font-family="'KaiTi','DFKai-SB','STKaiti','serif'"
        font-size="36"
        font-weight="900"
        fill="url(#txt)"
        filter="url(#glow)">仙</text>
</svg>
